apiversion: v1
kind: service
metadata:
  name: nginx-lb
spec:
  type: LoadBalancer
  selector:
    project: roboshop
    component: frontend
    environment: dev
    purpose: node-port
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30007
      #security group lo inbound rule open cheyali.
    
