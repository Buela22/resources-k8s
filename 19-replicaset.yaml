apiVersion: v1
kind: ReplicaSet
metadata:
  name: nginx
  # these are replica set lables
  labels:
    purpose: rs-demo
    project: roboshop
spec:
  replicas: 3
  selector:
  # these lables are used to select pods
    matchLabels:
      purpose: rs-demo
      project: roboshop
      #pod definition
  template:
    metadata:
      lables:
        purpose: rs-demo
        project: roboshop
    specc:
      containers:
      - name: nginx
        image: nginx:trixie-perl